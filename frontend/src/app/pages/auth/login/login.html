<div class="min-h-screen flex items-center justify-center px-4" style="background-color: var(--color-background)">

  <!-- Card -->
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg overflow-hidden">

    <!-- Header -->
    <div class="px-8 py-10 text-center" style="background-color: var(--color-neutral-primary)">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/10 mb-4">
        <i class="fa-solid fa-house-user text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white">Roommate System</h1>
      <p class="text-sm mt-1" style="color: var(--color-neutral-secondary); filter: brightness(2)">
        Sign in to your account
      </p>
    </div>

    <!-- Form -->
    <div class="px-8 py-8">

      <!-- Email -->
      <div class="mb-5">
        <label class="block text-sm font-medium mb-1" style="color: var(--color-text-primary)">
          Email Address
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color: var(--color-text-secondary)">
            <i class="fa-solid fa-envelope text-sm"></i>
          </span>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="you@example.com"
            class="w-full pl-9 pr-4 py-3 rounded-xl border text-sm outline-none transition-all"
            style="
              border-color: var(--color-border);
              color: var(--color-text-primary);
              background-color: var(--color-background);
            "
          />
        </div>
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-sm font-medium mb-1" style="color: var(--color-text-primary)">
          Password
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2" style="color: var(--color-text-secondary)">
            <i class="fa-solid fa-lock text-sm"></i>
          </span>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Enter your password"
            class="w-full pl-9 pr-10 py-3 rounded-xl border text-sm outline-none transition-all"
            style="
              border-color: var(--color-border);
              color: var(--color-text-primary);
              background-color: var(--color-background);
            "
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2"
            style="color: var(--color-text-secondary)"
          >
            <i class="fa-solid text-sm" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        (click)="onSubmit()"
        [disabled]="loading"
        class="w-full py-3 rounded-xl text-white font-semibold text-sm transition-all duration-200 flex items-center justify-center gap-2"
        style="background-color: var(--color-neutral-primary)"
      >
        @if (loading) {
          <i class="fa-solid fa-spinner fa-spin"></i>
          <span>Signing in...</span>
        } @else {
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span>Sign In</span>
        }
      </button>

      <!-- Register link -->
      <p class="text-center text-sm mt-6" style="color: var(--color-text-secondary)">
        Have an invite link?
        <a href="/register" class="font-medium hover:underline" style="color: var(--color-neutral-primary)">
          Set up your account
        </a>
      </p>

    </div>
  </div>

</div>
