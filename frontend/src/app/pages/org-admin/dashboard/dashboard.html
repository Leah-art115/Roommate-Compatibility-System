<div class="flex h-screen overflow-hidden" style="background-color: var(--color-background)">

  <!-- Mobile overlay -->
  @if (sidebarOpen()) {
    <div
      class="fixed inset-0 z-40 bg-black/50 lg:hidden"
      (click)="closeSidebar()">
    </div>
  }

  <!-- Sidebar -->
  <div
    class="fixed inset-y-0 left-0 z-50 transition-transform duration-300 lg:static lg:translate-x-0 lg:flex-shrink-0"
    [style.width]="'240px'"
    [class.translate-x-0]="sidebarOpen()"
    [class.-translate-x-full]="!sidebarOpen()">
    <app-sidebar (linkClicked)="closeSidebar()" />
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- Top Bar -->
    <div class="flex items-center justify-between px-4 py-3 bg-white border-b flex-shrink-0"
      style="border-color: var(--color-border)">
      <button
        (click)="toggleSidebar()"
        class="w-9 h-9 flex items-center justify-center rounded-xl transition-colors hover:bg-gray-100"
        style="color: var(--color-text-secondary)">
        <i class="fa-solid" [ngClass]="sidebarOpen() ? 'fa-xmark' : 'fa-bars'"></i>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold"
          style="background-color: var(--color-neutral-primary)">
          A
        </div>
      </div>
    </div>

    <!-- Page Content -->
    <div class="flex-1 overflow-y-auto p-4 md:p-6">
      <router-outlet />
    </div>

  </div>
</div>
