<div class="flex h-screen overflow-hidden" style="background-color: var(--color-background)">

  <div class="flex-shrink-0 transition-all duration-300"
    [style.width]="collapsed() ? '72px' : '240px'">
    <app-super-admin-sidebar [collapsed]="collapsed()" />
  </div>

  <div class="flex-1 flex flex-col overflow-hidden">
    <div class="flex items-center gap-4 px-6 py-4 bg-white border-b"
      style="border-color: var(--color-border)">
      <button
        (click)="toggleSidebar()"
        class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 transition-colors"
        style="color: var(--color-text-secondary)">
        <i class="fa-solid fa-bars text-sm"></i>
      </button>
      <div class="flex-1"></div>
    </div>
    <div class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </div>
  </div>
</div>
