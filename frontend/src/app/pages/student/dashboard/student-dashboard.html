<div class="flex h-screen overflow-hidden" style="background-color: var(--color-background)">

  <!-- Sidebar -->
  <div class="flex-shrink-0 transition-all duration-300"
    [style.width]="sidebarCollapsed() ? '64px' : '220px'">
    <app-student-sidebar [collapsed]="sidebarCollapsed()" />
  </div>

  <!-- Main -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Top bar -->
    <div class="flex items-center justify-between px-6 py-4 bg-white border-b"
      style="border-color: var(--color-border)">
      <button (click)="toggleSidebar()" class="text-sm" style="color: var(--color-text-secondary)">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold"
          style="background-color: var(--color-neutral-primary)">
          {{ user?.email?.charAt(0)?.toUpperCase() }}
        </div>
      </div>
    </div>

    <!-- Page content -->
    <div class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </div>

  </div>
</div>
